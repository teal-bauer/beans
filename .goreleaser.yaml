# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: beans
    main: ./cmd/beans
    binary: beans
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X github.com/hmans/beans/internal/version.Version={{.Version}}
      - -X github.com/hmans/beans/internal/version.Commit={{.ShortCommit}}
      - -X github.com/hmans/beans/internal/version.Date={{.Date}}

  - id: beans-serve
    main: ./cmd/beans-serve
    binary: beans-serve
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X github.com/hmans/beans/internal/version.Version={{.Version}}
      - -X github.com/hmans/beans/internal/version.Commit={{.ShortCommit}}
      - -X github.com/hmans/beans/internal/version.Date={{.Date}}

  - id: beans-tui
    main: ./cmd/beans-tui
    binary: beans-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X github.com/hmans/beans/internal/version.Version={{.Version}}
      - -X github.com/hmans/beans/internal/version.Commit={{.ShortCommit}}
      - -X github.com/hmans/beans/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  use: github
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^perf"
      - "^refactor"
  groups:
    - title: "⚠️ Breaking Changes"
      regexp: "!:"
      order: 0
    - title: Features
      regexp: "^feat"
      order: 1
    - title: Bug Fixes
      regexp: "^fix"
      order: 2
    - title: Performance
      regexp: "^perf"
      order: 3
    - title: Other
      order: 999

homebrew_casks:
  - repository:
      owner: hmans
      name: homebrew-beans
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/hmans/beans"
    description: "Agentic-first issue tracker"
    license: "Apache-2.0"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/beans"]
          end

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
